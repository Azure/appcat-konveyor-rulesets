- category: mandatory
  customVariables: []
  description: "CRA: Use of insecure TLS/SSL protocol version"
  effort: 5
  labels:
  - source
  - domain=cyber-resilience-act
  - category=insecure-tls
  - security
  links:
  - title: EU Cyber Resilience Act - Regulation (EU) 2024/2847
    url: https://eur-lex.europa.eu/eli/reg/2024/2847/oj
  - title: NIST SP 800-52 Rev. 2 - TLS Guidelines
    url: https://csrc.nist.gov/publications/detail/sp/800-52/rev-2/final
  message: |-
    **EU Cyber Resilience Act (Annex I, Part I, Section 2(c))** requires the use of **state of the art** encryption for data in transit.

    **SSLv2, SSLv3, TLS 1.0 and TLS 1.1** are deprecated protocols with known vulnerabilities (POODLE, BEAST, CRIME, etc.). They must not be used.

    **Recommended actions:**
    * Use `SSLContext.getInstance("TLSv1.3")` or at minimum `SSLContext.getInstance("TLSv1.2")`.
    * Configure your application to only accept TLS 1.2+ connections.
    * Update `setEnabledProtocols()` to exclude SSLv3, TLSv1, and TLSv1.1.
    * In Spring Boot, set `server.ssl.enabled-protocols=TLSv1.2,TLSv1.3`.
  ruleID: cra-insecure-tls-protocol-01000
  when:
    or:
    - builtin.filecontent:
        filePattern: \.java$
        pattern: 'SSLContext\.getInstance\(\s*"SSL"'
    - builtin.filecontent:
        filePattern: \.java$
        pattern: 'SSLContext\.getInstance\(\s*"SSLv2"'
    - builtin.filecontent:
        filePattern: \.java$
        pattern: 'SSLContext\.getInstance\(\s*"SSLv3"'
    - builtin.filecontent:
        filePattern: \.java$
        pattern: 'SSLContext\.getInstance\(\s*"TLS"\s*\)'
    - builtin.filecontent:
        filePattern: \.java$
        pattern: 'SSLContext\.getInstance\(\s*"TLSv1"'
    - builtin.filecontent:
        filePattern: \.java$
        pattern: 'SSLContext\.getInstance\(\s*"TLSv1\.1"'
    - builtin.filecontent:
        filePattern: \.java$
        pattern: 'setEnabledProtocols.*SSLv3'
    - builtin.filecontent:
        filePattern: \.java$
        pattern: 'setEnabledProtocols.*TLSv1[^.]'
    - builtin.filecontent:
        filePattern: \.java$
        pattern: 'setEnabledProtocols.*TLSv1\.1'
- category: mandatory
  customVariables: []
  description: "CRA: Insecure TLS protocol in configuration"
  effort: 3
  labels:
  - source
  - domain=cyber-resilience-act
  - category=insecure-tls
  - security
  links:
  - title: EU Cyber Resilience Act - Regulation (EU) 2024/2847
    url: https://eur-lex.europa.eu/eli/reg/2024/2847/oj
  - title: Spring Boot SSL Configuration
    url: https://docs.spring.io/spring-boot/docs/current/reference/html/howto.html#howto.webserver.configure-ssl
  message: |-
    **EU Cyber Resilience Act (Annex I, Part I, Section 2(c))** requires the use of **state of the art** encryption for data in transit.

    Insecure TLS/SSL protocol versions (SSLv3, TLS 1.0, TLS 1.1) were detected in configuration files. These protocols have known vulnerabilities and must be upgraded to TLS 1.2 or TLS 1.3.

    **Recommended actions:**
    * Set `server.ssl.enabled-protocols=TLSv1.2,TLSv1.3` in Spring Boot configuration.
    * For Tomcat, configure `sslEnabledProtocols="TLSv1.2,TLSv1.3"` in `server.xml`.
    * Remove all references to SSLv3, TLSv1, and TLSv1.1.
  ruleID: cra-insecure-tls-config-02000
  when:
    or:
    - builtin.filecontent:
        filePattern: (/|\\)(application|bootstrap)(-[a-zA-Z0-9]+)*?\.(properties|yaml|yml)$
        pattern: 'ssl\.enabled-protocols.*TLSv1[^.]'
    - builtin.filecontent:
        filePattern: (/|\\)(application|bootstrap)(-[a-zA-Z0-9]+)*?\.(properties|yaml|yml)$
        pattern: 'ssl\.enabled-protocols.*TLSv1\.1'
    - builtin.filecontent:
        filePattern: (/|\\)(application|bootstrap)(-[a-zA-Z0-9]+)*?\.(properties|yaml|yml)$
        pattern: 'ssl\.enabled-protocols.*SSLv3'
    - builtin.xml:
        namespaces: {}
        xpath: //*[contains(@sslProtocol,'TLSv1.1') or contains(@sslProtocol,'TLSv1') or contains(@sslProtocol,'SSLv3')]
    - builtin.xml:
        namespaces: {}
        xpath: //*[contains(@sslEnabledProtocols,'TLSv1.1') or contains(@sslEnabledProtocols,'SSLv3')]
- category: mandatory
  customVariables: []
  description: "CRA: Certificate validation bypass - TrustAllCerts"
  effort: 7
  labels:
  - source
  - domain=cyber-resilience-act
  - category=insecure-tls
  - security
  links:
  - title: EU Cyber Resilience Act - Regulation (EU) 2024/2847
    url: https://eur-lex.europa.eu/eli/reg/2024/2847/oj
  - title: CWE-295 - Improper Certificate Validation
    url: https://cwe.mitre.org/data/definitions/295.html
  message: |-
    **EU Cyber Resilience Act (Annex I, Part I, Section 2(c)(d))** requires that data confidentiality and integrity are protected during transit using state of the art mechanisms.

    Implementing a custom `X509TrustManager` that does not properly validate certificates (trust-all pattern) completely disables TLS certificate verification. This makes the application vulnerable to man-in-the-middle (MITM) attacks.

    **Recommended actions:**
    * Remove custom `TrustManager` implementations that accept all certificates.
    * Use the default `TrustManagerFactory` with the system or a properly configured trust store.
    * If you need custom certificate handling, use certificate pinning instead.
    * For development/testing, use profiles or environment-specific configurations instead of disabling validation in code.
  ruleID: cra-insecure-tls-trust-all-03000
  when:
    or:
    - builtin.filecontent:
        filePattern: \.java$
        pattern: 'implements\s+X509TrustManager'
    - builtin.filecontent:
        filePattern: \.java$
        pattern: 'TrustAllCerts'
    - builtin.filecontent:
        filePattern: \.java$
        pattern: 'AllowAllHostnameVerifier'
    - builtin.filecontent:
        filePattern: \.java$
        pattern: 'ALLOW_ALL_HOSTNAME_VERIFIER'
    - builtin.filecontent:
        filePattern: \.java$
        pattern: 'NoopHostnameVerifier'
    - builtin.filecontent:
        filePattern: \.java$
        pattern: 'setHostnameVerifier\(.*ALLOW_ALL'
    - builtin.filecontent:
        filePattern: \.java$
        pattern: 'SSLConnectionSocketFactory\.ALLOW_ALL'
    - java.referenced:
        location: IMPORT
        pattern: org.apache.http.conn.ssl.NoopHostnameVerifier
    - java.referenced:
        location: IMPORT
        pattern: org.apache.http.conn.ssl.AllowAllHostnameVerifier
- category: mandatory
  customVariables: []
  description: "CRA: Hostname verification disabled"
  effort: 7
  labels:
  - source
  - domain=cyber-resilience-act
  - category=insecure-tls
  - security
  links:
  - title: EU Cyber Resilience Act - Regulation (EU) 2024/2847
    url: https://eur-lex.europa.eu/eli/reg/2024/2847/oj
  - title: CWE-297 - Improper Validation of Certificate with Host Mismatch
    url: https://cwe.mitre.org/data/definitions/297.html
  message: |-
    **EU Cyber Resilience Act (Annex I, Part I, Section 2(c))** requires the use of state of the art encryption for data in transit.

    Overriding the `HostnameVerifier` to always return `true` disables hostname verification, allowing an attacker to present a certificate for a different domain. This enables man-in-the-middle attacks.

    **Recommended actions:**
    * Remove custom `HostnameVerifier` implementations that always return `true`.
    * Use the default `HttpsURLConnection.getDefaultHostnameVerifier()`.
    * For OkHttp, do not set a custom `HostnameVerifier`.
  ruleID: cra-insecure-tls-hostname-verify-04000
  when:
    or:
    - builtin.filecontent:
        filePattern: \.java$
        pattern: 'new HostnameVerifier\(\)\s*\{[^}]*return\s+true'
    - builtin.filecontent:
        filePattern: \.java$
        pattern: 'HostnameVerifier\s+\w+\s*=\s*\(.*\)\s*->\s*true'
    - builtin.filecontent:
        filePattern: \.java$
        pattern: 'verify\(String\s+\w+,\s*SSLSession\s+\w+\)\s*\{[^}]*return\s+true'
- category: mandatory
  customVariables: []
  description: "CRA: Insecure TLS cipher suites"
  effort: 5
  labels:
  - source
  - domain=cyber-resilience-act
  - category=insecure-tls
  - security
  links:
  - title: EU Cyber Resilience Act - Regulation (EU) 2024/2847
    url: https://eur-lex.europa.eu/eli/reg/2024/2847/oj
  - title: Mozilla SSL Configuration Generator
    url: https://ssl-config.mozilla.org/
  message: |-
    **EU Cyber Resilience Act (Annex I, Part I, Section 2(c))** requires the use of **state of the art** encryption mechanisms.

    Insecure TLS cipher suites (NULL, EXPORT, DES, RC4, anonymous key exchange) are present in the configuration. These cipher suites offer weak or no encryption and must be removed.

    **Recommended actions:**
    * Remove cipher suites containing `NULL`, `EXPORT`, `DES`, `RC4`, `anon`, or `MD5`.
    * Use only cipher suites from the Mozilla "Intermediate" or "Modern" configuration.
    * Prefer AEAD cipher suites (GCM, ChaCha20-Poly1305).
    * Example secure list: `TLS_AES_256_GCM_SHA384`, `TLS_CHACHA20_POLY1305_SHA256`, `TLS_AES_128_GCM_SHA256`.
  ruleID: cra-insecure-tls-cipher-suite-05000
  when:
    or:
    - builtin.filecontent:
        filePattern: \.(java|properties|yaml|yml)$
        pattern: 'SSL_NULL'
    - builtin.filecontent:
        filePattern: \.(java|properties|yaml|yml)$
        pattern: 'TLS_NULL'
    - builtin.filecontent:
        filePattern: \.(java|properties|yaml|yml)$
        pattern: 'SSL_RSA_WITH_NULL'
    - builtin.filecontent:
        filePattern: \.(java|properties|yaml|yml)$
        pattern: '_EXPORT_'
    - builtin.filecontent:
        filePattern: \.(java|properties|yaml|yml)$
        pattern: 'SSL_RSA_WITH_DES'
    - builtin.filecontent:
        filePattern: \.(java|properties|yaml|yml)$
        pattern: 'SSL_RSA_WITH_RC4'
    - builtin.filecontent:
        filePattern: \.(java|properties|yaml|yml)$
        pattern: 'TLS_RSA_WITH_RC4'
    - builtin.filecontent:
        filePattern: \.(java|properties|yaml|yml)$
        pattern: 'SSL_DH_anon'
    - builtin.filecontent:
        filePattern: \.(java|properties|yaml|yml)$
        pattern: 'TLS_DH_anon'
