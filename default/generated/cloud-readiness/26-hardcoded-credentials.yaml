- category: mandatory
  customVariables: []
  description: "CRA: Hard-coded password in Java source code"
  effort: 8
  labels:
  - source
  - domain=cloud-readiness
  - category=hardcoded-credential
  - security
  - target=azure-aks
  - target=azure-container-apps
  - target=azure-appservice
  - os=windows
  - os=linux
  links:
  - title: EU Cyber Resilience Act - Regulation (EU) 2024/2847
    url: https://eur-lex.europa.eu/eli/reg/2024/2847/oj
  - title: CWE-798 - Use of Hard-coded Credentials
    url: https://cwe.mitre.org/data/definitions/798.html
  - title: OWASP - Hard-coded Credentials
    url: https://owasp.org/www-community/vulnerabilities/Use_of_hard-coded_password
  message: |-
    **EU Cyber Resilience Act (Annex I, Part I, Section 2(b))** requires products to be delivered with a **secure by default configuration** and to protect against unauthorized access using appropriate authentication mechanisms.

    Hard-coded passwords in source code are a critical security vulnerability. They cannot be easily changed, may be exposed through version control systems, and violate the principle of secure by default.

    **Recommended actions:**
    * Move all credentials to a secure secrets management system (e.g., Azure Key Vault, HashiCorp Vault).
    * Use environment variables or externalized configuration for sensitive values.
    * Use connection pooling with credential providers instead of static credentials.
    * For development, use `.env` files that are excluded from version control.
  ruleID: cra-hardcoded-credential-password-01000
  when:
    or:
    - builtin.filecontent:
        filePattern: \.java$
        # Matches: password/passwd/pwd = "...", .setPassword("..."), new PasswordAuthentication("...", "..."), .password("...")
        pattern: '(?i)(password|passwd|pwd)\s*=\s*"[^"]{3,}"|(?i)\.setPassword\(\s*"[^"]{1,}"|(?i)new\s+PasswordAuthentication\(\s*"[^"]*"\s*,\s*"[^"]*"|(?i)\.password\(\s*"[^"]{1,}"'
- category: mandatory
  customVariables: []
  description: "CRA: Hard-coded API key or secret in Java source code"
  effort: 8
  labels:
  - source
  - domain=cloud-readiness
  - category=hardcoded-credential
  - security
  - target=azure-aks
  - target=azure-container-apps
  - target=azure-appservice
  - os=windows
  - os=linux
  links:
  - title: EU Cyber Resilience Act - Regulation (EU) 2024/2847
    url: https://eur-lex.europa.eu/eli/reg/2024/2847/oj
  - title: CWE-798 - Use of Hard-coded Credentials
    url: https://cwe.mitre.org/data/definitions/798.html
  message: |-
    **EU Cyber Resilience Act (Annex I, Part I, Section 2(b))** requires products to protect against unauthorized access using appropriate control mechanisms.

    Hard-coded API keys, tokens, and secrets in source code can be extracted from compiled binaries or version control history. They represent a persistent security risk that cannot be mitigated by access controls alone.

    **Recommended actions:**
    * Store all API keys and secrets in a secure vault (e.g., Azure Key Vault, AWS Secrets Manager, HashiCorp Vault).
    * Use environment variables for configuration injection.
    * Implement secret rotation policies.
    * Use service-to-service authentication (e.g., managed identities, OAuth2 client credentials) instead of static API keys.
  ruleID: cra-hardcoded-credential-apikey-02000
  when:
    or:
    - builtin.filecontent:
        filePattern: \.java$
        # Matches: hard-coded api_key, secret_key, client_secret, access_token, auth_token, private_key assignments with string values (8+ chars)
        pattern: '(?i)(api[_\-]?key|apikey|secret[_\-]?key|secretkey|client[_\-]?secret|access[_\-]?token|auth[_\-]?token|private[_\-]?key)\s*=\s*"[^"]{8,}"'
- category: mandatory
  customVariables: []
  description: "CRA: Hard-coded credentials in configuration files"
  effort: 5
  labels:
  - source
  - domain=cloud-readiness
  - category=hardcoded-credential
  - security
  - target=azure-aks
  - target=azure-container-apps
  - target=azure-appservice
  - os=windows
  - os=linux
  links:
  - title: EU Cyber Resilience Act - Regulation (EU) 2024/2847
    url: https://eur-lex.europa.eu/eli/reg/2024/2847/oj
  - title: CWE-260 - Password in Configuration File
    url: https://cwe.mitre.org/data/definitions/260.html
  message: |-
    **EU Cyber Resilience Act (Annex I, Part I, Section 2(b))** requires a secure by default configuration and protection against unauthorized access.

    Credentials (passwords, API keys, connection strings with embedded passwords) found in configuration files may be exposed through source control, deployment artifacts, or unauthorized file access.

    **Recommended actions:**
    * Use a secrets management service (e.g., Azure Key Vault, HashiCorp Vault) to externalize all secrets.
    * Use environment variable references in configuration: `${DB_PASSWORD}` or `${env.DB_PASSWORD}`.
    * Use Spring Cloud Config with encrypted values or Spring Cloud Vault.
    * Ensure configuration files with secrets are excluded from version control (`.gitignore`).
  ruleID: cra-hardcoded-credential-config-03000
  when:
    or:
    - builtin.filecontent:
        filePattern: (/|\\)(application|bootstrap)(-[a-zA-Z0-9]+)*?\.(properties|yaml|yml)$
        # Matches: api_key, secret_key, client_secret, etc. with values in config files
        pattern: '(?i)(api[_\-]?key|apikey|secret[_\-]?key|secretkey|client[_\-]?secret|access[_\-]?token|auth[_\-]?token|private[_\-]?key)\s*[=:]\s*\S+'
    - builtin.filecontent:
        filePattern: (/|\\)(application|bootstrap)(-[a-zA-Z0-9]+)*?\.(properties|yaml|yml)$
        # Matches: AWS access key ID or secret access key in config files
        pattern: '(?i)(aws_access_key_id|aws_secret_access_key)\s*[=:]\s*\S+'
    - builtin.filecontent:
        filePattern: \.properties$
        # Matches: JDBC connection strings with embedded password
        pattern: '(?i)jdbc[.:].*(password|pwd)\s*=\s*\S+'
- category: mandatory
  customVariables: []
  description: "CRA: Default or well-known password detected"
  effort: 3
  labels:
  - source
  - domain=cloud-readiness
  - category=hardcoded-credential
  - security
  - target=azure-aks
  - target=azure-container-apps
  - target=azure-appservice
  - os=windows
  - os=linux
  links:
  - title: EU Cyber Resilience Act - Regulation (EU) 2024/2847
    url: https://eur-lex.europa.eu/eli/reg/2024/2847/oj
  - title: ETSI EN 303 645 - No Universal Default Passwords
    url: https://www.etsi.org/deliver/etsi_en/303600_303699/303645/02.01.01_60/en_303645v020101p.pdf
  message: |-
    **EU Cyber Resilience Act (Annex I, Part I, Section 2(b))** requires a **secure by default configuration**. The use of default, well-known, or trivial passwords violates the secure-by-default principle.

    ETSI EN 303 645 (referenced standard for CRA compliance) explicitly prohibits universal default passwords in Provision 5.1-1.

    **Recommended actions:**
    * Remove all default/well-known passwords from code and configuration.
    * Require unique, strong passwords during initial setup.
    * Use generated secrets that are unique per deployment.
    * Implement password complexity requirements.
  ruleID: cra-hardcoded-credential-default-pwd-04000
  when:
    or:
    - builtin.filecontent:
        filePattern: \.(java|properties|yaml|yml|xml)$
        # Matches: common default/well-known passwords (admin, root, password, 123456, etc.) in password assignments
        pattern: '(?i)(password|passwd|pwd)\s*[=:]\s*"?(admin|root|password|123456|changeit|changeme|default|test|guest|letmein|welcome|p@ssw0rd)"?(\s|$|;)'
    - builtin.filecontent:
        filePattern: \.java$
        # Matches: .setPassword("admin"/"root"/"password"/etc.)
        pattern: '(?i)\.setPassword\(\s*"(admin|root|password|123456|changeit|changeme|default|test|guest)"\s*\)'
- category: mandatory
  customVariables: []
  description: "CRA: Hard-coded cryptographic key in source code"
  effort: 8
  labels:
  - source
