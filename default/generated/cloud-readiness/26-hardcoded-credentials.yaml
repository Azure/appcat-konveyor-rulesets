  - category=hardcoded-credential
  - security
  - target=azure-aks
  - target=azure-container-apps
  - target=azure-appservice
  - os=windows
  - os=linux
  links:
  - title: EU Cyber Resilience Act - Regulation (EU) 2024/2847
    url: https://eur-lex.europa.eu/eli/reg/2024/2847/oj
  - title: CWE-321 - Use of Hard-coded Cryptographic Key
    url: https://cwe.mitre.org/data/definitions/321.html
  message: |-
    **EU Cyber Resilience Act (Annex I, Part I, Section 2(c))** requires the use of state of the art cryptographic mechanisms. Hard-coded encryption keys completely undermine the confidentiality that encryption is supposed to provide.

    If an attacker discovers the key (e.g., through reverse engineering or source code access), all data encrypted with that key is compromised.

    **Recommended actions:**
    * Use a Key Management Service (KMS) to generate and store cryptographic keys.
    * Use `KeyStore` with a hardware-backed or software-protected key store.
    * Derive keys from secure sources using KDF (Key Derivation Functions).
    * Implement key rotation policies.
  ruleID: cra-hardcoded-credential-crypto-key-05000
  when:
    or:
    - builtin.filecontent:
        filePattern: \.java$
        # Matches: new SecretKeySpec/IvParameterSpec with hard-coded string or byte array, new PBEKeySpec with hard-coded password
        pattern: 'new SecretKeySpec\(\s*(".*\.|new byte)|new IvParameterSpec\(\s*(".*\.|new byte)|new PBEKeySpec\(\s*"[^"]+"\.'
