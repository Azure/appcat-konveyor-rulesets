rulesPath: ../26-hardcoded-credentials.yaml
providers:
- name: java
  dataPath: ./data/26-hardcoded-credentials
- name: builtin
  dataPath: ./data/26-hardcoded-credentials
tests:
- ruleID: cra-hardcoded-credential-password-01000
  testCases:
  - name: tc-1
    hasIncidents:
      atLeast: 3
      messageMatches: Hard-coded passwords in source code are a critical security vulnerability.*
- ruleID: cra-hardcoded-credential-apikey-02000
  testCases:
  - name: tc-1
    hasIncidents:
      atLeast: 3
      messageMatches: Hard-coded API keys, tokens, and secrets in source code.*
- ruleID: cra-hardcoded-credential-config-03000
  testCases:
  - name: tc-1
    hasIncidents:
      atLeast: 2
      messageMatches: Credentials.*found in configuration files may be exposed.*
- ruleID: cra-hardcoded-credential-default-pwd-04000
  testCases:
  - name: tc-1
    hasIncidents:
      atLeast: 2
      messageMatches: use of default, well-known, or trivial passwords violates the secure-by-default principle.*
- ruleID: cra-hardcoded-credential-crypto-key-05000
  testCases:
  - name: tc-1
    hasIncidents:
      atLeast: 3
      messageMatches: Hard-coded encryption keys completely undermine the confidentiality.*
