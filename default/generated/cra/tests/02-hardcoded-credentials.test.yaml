rulesPath: ../02-hardcoded-credentials.yaml
providers:
- name: java
  dataPath: ./data/02-hardcoded-credentials
- name: builtin
  dataPath: ./data/02-hardcoded-credentials
tests:
- ruleID: cra-hardcoded-credential-00001
  testCases:
  - name: tc-1
    hasIncidents:
      exactly: 2
      messageMatches: contains hardcoded credentials
- ruleID: cra-hardcoded-credential-00002
  testCases:
  - name: tc-1
    hasIncidents:
      exactly: 1
      messageMatches: passes hardcoded username and password directly in a JDBC
- ruleID: cra-hardcoded-credential-00003
  testCases:
  - name: tc-1
    hasIncidents:
      exactly: 3
      messageMatches: contains plaintext passwords, secrets, API keys, or tokens in configuration files
