- category: mandatory
  customVariables: []
  description: Hardcoded Password or Secret in Java Source Code
  effort: 5
  labels:
  - domain=cra-compliance
  - category=hardcoded-credential
  - target=azure-appservice
  - target=azure-aks
  - target=azure-container-apps
  - security
  - os=windows
  - os=linux
  links:
  - title: "CRA Annex I - Section 1.2(b): No Known Exploitable Vulnerabilities"
    url: https://eur-lex.europa.eu/eli/reg/2024/2847/oj
  - title: Azure Key Vault Documentation
    url: https://learn.microsoft.com/azure/key-vault/general/overview
  - title: OWASP - Use of Hard-coded Credentials
    url: https://owasp.org/Top10/A07_2021-Identification_and_Authentication_Failures/
  message: |-
    The application contains hardcoded credentials (password, secret, API key, or token) directly in Java source code. Hardcoded secrets are easily discovered through source code analysis, version control history, or decompilation, and cannot be rotated without redeployment.

    This violates **EU Cyber Resilience Act (CRA) Annex I, Section 1.2(b)**, which requires products to be delivered without known exploitable vulnerabilities, including default or hardcoded credentials.

    Recommendations:
    * Move all secrets to a secure vault: Azure Key Vault, HashiCorp Vault, or environment variables.
    * Use Spring Cloud Azure Key Vault integration or similar frameworks for seamless secret injection.
    * Implement secret rotation policies and avoid storing secrets in source code repositories.
    * Scan repositories with tools like git-secrets or truffleHog to prevent accidental secret commits.
  ruleID: cra-hardcoded-credential-00001
  when:
    builtin.filecontent:
      filePattern: .*\.java
      pattern: (password|passwd|pwd|secret|apiKey|api_key|secretKey|secret_key|token)\s*=\s*"[^"]+?"
- category: mandatory
  customVariables: []
  description: Hardcoded Credentials in JDBC Connection String
  effort: 5
  labels:
  - domain=cra-compliance
  - category=hardcoded-credential
  - target=azure-appservice
  - target=azure-aks
  - target=azure-container-apps
  - security
  - os=windows
  - os=linux
  links:
  - title: "CRA Annex I - Section 1.2(b): No Known Exploitable Vulnerabilities"
    url: https://eur-lex.europa.eu/eli/reg/2024/2847/oj
  - title: Azure Key Vault Documentation
    url: https://learn.microsoft.com/azure/key-vault/general/overview
  - title: Passwordless Connections for Azure Services
    url: https://learn.microsoft.com/azure/developer/java/spring-framework/deploy-passwordless-spring-database-app
  message: |-
    The application passes hardcoded username and password directly in a JDBC `getConnection()` call. This exposes database credentials in source code and compiled artifacts, creating a significant security risk.

    This violates **EU Cyber Resilience Act (CRA) Annex I, Section 1.2(b)**, which requires products to be delivered without known exploitable vulnerabilities.

    Recommendations:
    * Use Azure Managed Identity or passwordless connections for Azure database services.
    * Store database credentials in Azure Key Vault and inject them at runtime.
    * Use connection pooling libraries (HikariCP) with externalized configuration.
    * Configure credentials via environment variables or Spring externalized configuration (`application.properties` with `${ENV_VAR}` placeholders).
  ruleID: cra-hardcoded-credential-00002
  when:
    builtin.filecontent:
      filePattern: .*\.java
      pattern: getConnection\(\s*"[^"]*"\s*,\s*"[^"]*"\s*,\s*"[^"]*"
- category: potential
  customVariables: []
  description: Plaintext Password in Configuration File
  effort: 5
  labels:
  - domain=cra-compliance
  - category=hardcoded-credential
  - target=azure-appservice
  - target=azure-aks
  - target=azure-container-apps
  - security
  - os=windows
  - os=linux
  links:
  - title: "CRA Annex I - Section 1.2(b): No Known Exploitable Vulnerabilities"
    url: https://eur-lex.europa.eu/eli/reg/2024/2847/oj
  - title: Azure Key Vault Documentation
    url: https://learn.microsoft.com/azure/key-vault/general/overview
  - title: Spring Cloud Azure Starter Key Vault Secrets
    url: https://learn.microsoft.com/azure/developer/java/spring-framework/configure-spring-boot-starter-java-app-with-azure-key-vault
  message: |-
    The application contains plaintext passwords, secrets, API keys, or tokens in configuration files (`.properties`, `.yaml`, `.yml`). Configuration files are often committed to version control and deployed alongside the application, making secrets easily accessible.

    This may conflict with **EU Cyber Resilience Act (CRA) Annex I, Section 1.2(b)**, which requires products to be delivered without known exploitable vulnerabilities.

    Recommendations:
    * Replace plaintext values with environment variable references: `password=${DB_PASSWORD}`.
    * Use Azure Key Vault with Spring Cloud Azure for automatic secret injection.
    * Use encrypted property sources (Jasypt, Spring Cloud Config encryption).
    * Never commit configuration files containing secrets to version control; use `.gitignore` and secret scanning tools.
  ruleID: cra-hardcoded-credential-00003
  when:
    builtin.filecontent:
      filePattern: (/|\\)(application|bootstrap)(-[a-zA-Z0-9]+)*?\.(properties|yaml|yml)$
      pattern: (password|secret|api[_-]?key|token)\s*[=:]\s*[^\s${}][^\n]+
