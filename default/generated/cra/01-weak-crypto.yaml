  description: Weak Signature Algorithm (MD5/SHA1-based)
  effort: 5
  labels:
  - domain=cra-compliance
  - category=weak-cryptography
  - target=azure-appservice
  - target=azure-aks
  - target=azure-container-apps
  - security
  - os=windows
  - os=linux
  links:
  - title: "CRA Annex I - Section 1.2(c): Data Protection"
    url: https://eur-lex.europa.eu/eli/reg/2024/2847/oj
  - title: NIST Policy on Hash Functions
    url: https://csrc.nist.gov/projects/hash-functions
  message: |-
    The application uses a weak signature algorithm based on MD5 or SHA-1 (e.g., `MD5withRSA`, `SHA1withRSA`, `SHA1withDSA`). These hash functions are vulnerable to collision attacks, making signatures forgeable.

    This violates **EU Cyber Resilience Act (CRA) Annex I, Section 1.2(c)**, which requires state-of-the-art cryptographic mechanisms for data integrity.

    Recommendations:
    * Replace with SHA-256 or stronger based signatures: `Signature.getInstance("SHA256withRSA")`.
    * For ECDSA, use `SHA256withECDSA` or `SHA384withECDSA`.
    * Update all certificate signing to use SHA-256 or SHA-384.
  ruleID: cra-weak-crypto-00009
  when:
    builtin.filecontent:
      filePattern: .*\.java
      pattern: Signature\.getInstance\(\s*"(MD5|SHA1)with
- category: potential
  customVariables: []
  description: Use of Insecure Random Number Generator
  effort: 5
  labels:
  - domain=cra-compliance
  - category=weak-cryptography
  - target=azure-appservice
  - target=azure-aks
  - target=azure-container-apps
  - security
  - os=windows
  - os=linux
  links:
  - title: "CRA Annex I - Section 1.2(c): Data Protection"
    url: https://eur-lex.europa.eu/eli/reg/2024/2847/oj
  - title: Java SecureRandom Documentation
    url: https://docs.oracle.com/en/java/javase/17/docs/api/java.base/java/security/SecureRandom.html
  message: |-
    The application uses `java.util.Random`, which is not cryptographically secure. Its output is predictable given enough observed values, making it unsuitable for generating security-sensitive values such as tokens, keys, nonces, or session IDs.

    This may conflict with **EU Cyber Resilience Act (CRA) Annex I, Section 1.2(c)**, which requires appropriate cryptographic mechanisms.

    Recommendations:
    * Replace `java.util.Random` with `java.security.SecureRandom` for all security-sensitive random number generation.
    * Use `SecureRandom.getInstanceStrong()` when the highest entropy is required.
    * `java.util.Random` is acceptable for non-security purposes (e.g., simulations, shuffling UI elements).
  ruleID: cra-weak-crypto-00010
  when:
    java.referenced:
      location: CONSTRUCTOR_CALL
      pattern: java.util.Random
